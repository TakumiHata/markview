<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c9eff"/>
      <stop offset="100%" style="stop-color:#3a6fd8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8edf5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Slide card shadow -->
  <rect x="96" y="116" width="320" height="220" rx="16" fill="rgba(0,0,0,0.15)"/>
  <!-- Slide card -->
  <rect x="88" y="108" width="320" height="220" rx="16" fill="url(#card)"/>
  <!-- Heading line on card -->
  <rect x="120" y="145" width="160" height="14" rx="7" fill="#3a6fd8"/>
  <!-- Text lines on card -->
  <rect x="120" y="178" width="240" height="8" rx="4" fill="#b0bdd0"/>
  <rect x="120" y="198" width="200" height="8" rx="4" fill="#b0bdd0"/>
  <rect x="120" y="218" width="220" height="8" rx="4" fill="#b0bdd0"/>
  <!-- Bullet dots -->
  <circle cx="134" cy="254" r="5" fill="#3a6fd8"/>
  <circle cx="134" cy="274" r="5" fill="#3a6fd8"/>
  <rect x="150" y="250" width="140" height="8" rx="4" fill="#b0bdd0"/>
  <rect x="150" y="270" width="120" height="8" rx="4" fill="#b0bdd0"/>
  <!-- Second slide (behind, offset) -->
  <rect x="118" y="348" width="296" height="24" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Play/preview triangle -->
  <g transform="translate(356, 340)">
    <circle cx="40" cy="40" r="48" fill="rgba(255,255,255,0.95)"/>
    <polygon points="28,18 28,62 62,40" fill="#3a6fd8"/>
  </g>
</svg>
